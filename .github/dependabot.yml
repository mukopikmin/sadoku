version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/src/preview"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "npm"
    groups:
      npm-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      npm-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: "deno"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    groups:
      deno-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      deno-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-security-updates:
        applies-to: "security-updates"
        patterns:
          - "*"
      github-actions-dependencies:
        applies-to: "version-updates"
        patterns:
          - "*"
    open-pull-requests-limit: 5
