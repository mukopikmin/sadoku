name: Nightly Release

on:
  workflow_run:
    workflows:
      - Test
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish nightly release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.8.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/preview/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix src/preview

      - name: Resolve nightly version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          stable_tag="$(gh release view --json tagName --jq '.tagName')"
          stable_version="${stable_tag#v}"
          if [[ ! "${stable_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Could not resolve a stable semantic version release." >&2
            exit 1
          fi

          echo "version=${stable_version}-nightly" >> "${GITHUB_OUTPUT}"
          echo "tag=v${stable_version}-nightly" >> "${GITHUB_OUTPUT}"

      - name: Build nightly artifacts
        run: deno task dist --version "${{ steps.version.outputs.version }}"

      - name: Move nightly tag
        run: |
          tag="${{ steps.version.outputs.tag }}"
          git tag --force "${tag}" "${{ github.event.workflow_run.head_sha }}"
          git push origin "refs/tags/${tag}" --force

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release edit "${tag}" \
              --title "${tag}" \
              --notes "Latest tested build from main (${{ github.event.workflow_run.head_sha }})." \
              --prerelease \
              --latest=false
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* \
              --title "${tag}" \
              --notes "Latest tested build from main (${{ github.event.workflow_run.head_sha }})." \
              --prerelease \
              --latest=false \
              --verify-tag
          fi

      - name: Remove superseded nightly releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_tag="${{ steps.version.outputs.tag }}"
          gh release list \
            --exclude-drafts \
            --limit 100 \
            --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease and (.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+-nightly$"))) | .tagName' |
            while IFS= read -r tag; do
              if [[ "${tag}" != "${current_tag}" ]]; then
                gh release delete "${tag}" --cleanup-tag --yes
              fi
            done
