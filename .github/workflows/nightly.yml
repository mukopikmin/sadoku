name: Nightly Release

on:
  workflow_run:
    workflows:
      - Test
    types:
      - completed
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish nightly release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.8.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/preview/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix src/preview

      - name: Build nightly artifacts
        run: deno task dist --version 0.0.0-nightly

      - name: Move nightly tag
        run: |
          git tag --force v0.0.0-nightly "${{ github.event.workflow_run.head_sha }}"
          git push origin refs/tags/v0.0.0-nightly --force

      - name: Publish nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.0.0-nightly >/dev/null 2>&1; then
            gh release edit v0.0.0-nightly \
              --title "v0.0.0-nightly" \
              --notes "Latest tested build from main (${{ github.event.workflow_run.head_sha }})." \
              --prerelease \
              --latest=false
            gh release upload v0.0.0-nightly dist/* --clobber
          else
            gh release create v0.0.0-nightly dist/* \
              --title "v0.0.0-nightly" \
              --notes "Latest tested build from main (${{ github.event.workflow_run.head_sha }})." \
              --prerelease \
              --latest=false \
              --verify-tag
          fi
