name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Deno
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/preview/client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix src/preview/client

      - name: Check formatting
        run: deno fmt --check

      - name: Type check
        run: deno check --lock=deno.lock src/main.ts scripts/compile.ts scripts/install_macos.ts

      - name: Test client
        run: npm test

      - name: Test
        run: deno task test
