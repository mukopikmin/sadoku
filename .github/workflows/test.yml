name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Deno
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.8.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/preview/client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix src/preview/client

      - name: Check formatting
        run: deno fmt --check

      - name: Type check
        run: deno check --lock=deno.lock src/main.ts scripts/compile.ts scripts/install_macos.ts scripts/generate_third_party_notices.ts scripts/build_release.ts

      - name: Test client
        run: npm test

      - name: Test
        run: deno task test

      - name: Compile
        run: deno task compile --output /tmp/mdview-ci
