name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Deno
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.8.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/preview/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix src/preview

      - name: Check formatting
        run: deno fmt --check

      - name: Type check
        run: deno check --lock=deno.lock src/main.ts scripts/compile.ts scripts/install_unix.ts scripts/generate_third_party_notices.ts scripts/build_release.ts

      - name: Test client
        run: npm test

      - name: Test
        run: deno task test

      - name: Compile
        run: deno task compile --output /tmp/sadoku-ci

      - name: Test Linux installer
        run: |
          install_home="$(mktemp -d)"
          trap 'rm -rf "$install_home"' EXIT
          HOME="$install_home" deno task install --version 0.0.0-ci
          test "$("$install_home/.local/bin/sadoku" --version)" = "sadoku 0.0.0-ci"
