name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: v2.8.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/preview/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix src/preview

      - name: Resolve release version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '${tag}' is not a supported semantic version tag." >&2
            echo "Use a tag like v1.2.3 or 1.2.3." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build release artifacts
        run: deno task dist --version "${{ steps.version.outputs.version }}"

      - name: Resolve release notes start tag
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          previous_tag="$(
            gh release list \
              --exclude-drafts \
              --exclude-pre-releases \
              --limit 1 \
              --json tagName \
              --jq '.[0].tagName // ""'
          )"
          if [[ -z "${previous_tag}" ]]; then
            previous_tag="release-notes-baseline"
          fi
          start_sha="$(
            git ls-remote --exit-code --tags origin "refs/tags/${previous_tag}" |
              awk '{print $1}'
          )"
          if [[ "${previous_tag}" == "release-notes-baseline" ]]; then
            root_sha="$(git rev-list --max-parents=0 HEAD)"
            test "${start_sha}" = "${root_sha}"
          fi
          echo "start-tag=${previous_tag}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes-start-tag "${{ steps.notes.outputs.start-tag }}" \
            --verify-tag
